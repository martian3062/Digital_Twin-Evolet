version: "3.9"

services:
  # ─── Backend API ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 medgenie.asgi:application"

  # ─── AI Engine ─────────────────────────────────
  ai-engine:
    build:
      context: ./ai_engine
      dockerfile: ../deploy/Dockerfile.ai
    ports:
      - "8100:8100"
    env_file: .env
    volumes:
      - ./ai_engine:/app
    command: python server.py

  # ─── Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/Dockerfile.frontend
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  # ─── Redis (Channel Layer) ────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  node_modules:
  next_cache:
