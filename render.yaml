services:
  - type: web
    name: medgenie-api
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medgenie-db
          property: connectionString
      - key: DEBUG
        value: "False"

  - type: web
    name: medgenie-ai-engine
    env: python
    buildCommand: "pip install -r ai_engine/requirements.txt"
    startCommand: "uvicorn ai_engine.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: MODEL_QUANTIZATION
        value: "true"

databases:
  - name: medgenie-db
    plan: free
